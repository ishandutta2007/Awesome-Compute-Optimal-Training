<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid Perspective -->
  <path d="M 0,400 L 1200,400 L 900,200 L 300,200 Z" fill="url(#gridGrad)" opacity="0.3" />
  
  <!-- Graphic Elements (Neural Nets / Nodes) -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="1">
    <line x1="150" y1="100" x2="300" y2="80" />
    <line x1="300" y1="80" x2="450" y2="150" />
    <line x1="450" y1="150" x2="250" y2="280" />
    <line x1="250" y1="280" x2="150" y2="100" />
    <line x1="150" y1="100" x2="450" y2="150" />
    <line x1="300" y1="80" x2="250" y2="280" />
  </g>

  <!-- Glowing Nodes -->
  <circle cx="150" cy="100" r="6" fill="#38bdf8" filter="url(#glow)" />
  <circle cx="300" cy="80" r="8" fill="#a855f7" filter="url(#glow)" />
  <circle cx="450" cy="150" r="5" fill="#ec4899" filter="url(#glow)" />
  <circle cx="250" cy="280" r="7" fill="#6366f1" filter="url(#glow)" />

  <!-- Math scaling curves representing Kaplan / Chinchilla -->
  <path d="M 750,300 Q 850,200 1100,100" fill="none" stroke="#38bdf8" stroke-width="4" stroke-dasharray="8 4" opacity="0.6" />
  <path d="M 750,320 Q 900,280 1100,240" fill="none" stroke="#a855f7" stroke-width="4" filter="url(#glow)" />
  <path d="M 750,340 C 850,340 950,150 1100,140" fill="none" stroke="#ec4899" stroke-width="3" opacity="0.8" />

  <!-- Text content -->
  <text x="100" y="200" font-family="'Outfit', 'Inter', sans-serif" font-size="52" font-weight="900" fill="url(#accentGrad)" filter="url(#glow)">
    COMPUTE-OPTIMAL
  </text>
  <text x="100" y="255" font-family="'Outfit', 'Inter', sans-serif" font-size="32" font-weight="600" fill="#f8fafc" letter-spacing="1.5">
    TRAINING LANDSCAPE
  </text>
  <text x="100" y="295" font-family="'Inter', sans-serif" font-size="16" font-weight="400" fill="#94a3b8" letter-spacing="0.5">
    Scaling Laws, Overtraining, MoE &amp; Production Infrastructure
  </text>

  <!-- Decorative Border -->
  <rect x="15" y="15" width="1170" height="370" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-opacity="0.3" rx="10" />
</svg>
